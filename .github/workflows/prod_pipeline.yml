#name: Dev to Prod

name: Deploy to Development

on:
  push:
    branches: [main]


jobs:
  Build_and_Push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.image.outputs.image }}
      version: ${{ steps.version_cal.outputs.version_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login into Digital Ocean
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DIGITALOCEAN_TOKEN }}
          password: ${{ secrets.DIGITALOCEAN_TOKEN }}

      - name: Assign version
        id: version_cal
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          

      - name: Set Image Name
        id: image
        run: |
          IMAGE="${{ vars.REGISTRY }}/${{ vars.IMAGE_NAME }}"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
        
      - name: Build and Push Docker image
        run: |
          
          echo "Bulding and Push image to Digital Ocean"

          docker build -t ${{ steps.image.outputs.image}}:${{ steps.version_cal.outputs.version_tag }} .
          docker push ${{ steps.image.outputs.image}}:${{ steps.version_cal.outputs.version_tag }}

  Deploy_Development:
    name: Deploy Development
    runs-on: ubuntu-latest
    needs: Build_and_Push
    steps:

      - name: Login into Digital Ocean
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DIGITALOCEAN_TOKEN }}
          password: ${{ secrets.DIGITALOCEAN_TOKEN }}

        
      - name: Fetch Image and deploy to Dev
        id: docker_step
        run: |
          
          IMAGE="${{ needs.Build_and_Push.outputs.image }}:${{ needs.Build_and_Push.outputs.version }}"

          echo "Pull Docker image from DO"
          docker pull $IMAGE

          echo "deploying to Development"
          docker rm -f myapp || true
          docker run -d --name myapp -p 8080:8080 $IMAGE

      - name: Success Message
        if: steps.docker_step.outcome == 'success'
        run: |

          echo "Application deployed Successfully!"

          IMAGE="${{ needs.Build_and_Push.outputs.image }}"
          VERSION="${{ needs.Build_and_Push.outputs.version }}"
          VERSIONED_IMAGE="${{ needs.Build_and_Push.outputs.image }}:${{ needs.Build_and_Push.outputs.version }}"

          #echo "Pull Docker image from DO"
          #docker pull $IMAGE:$VERSIONs
          docker pull $VERSIONED_IMAGE

          echo "Adding latest tag to the image"
          docker tag $VERSIONED_IMAGE "$IMAGE:latest"

          docker push "$IMAGE:latest"



          


          




      
        
        



